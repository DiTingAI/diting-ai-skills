name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Build binary for current platform
      run: npm run build:binary:host
      
    - name: Verify binary works
      run: ./dist/diting --help

  build-multi-platform:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build all platform binaries
      run: npm run build:binary:all
    
    - name: List built binaries
      run: ls -la dist/
    
    - name: Upload binaries as artifact
      uses: actions/upload-artifact@v4
      with:
        name: diting-binaries
        path: dist/
        retention-days: 7

  release:
    needs: build-multi-platform
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        name: diting-binaries
        path: dist/
    
    - name: Get version from package.json
      id: get_version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: |
          ## 谛听 AI Skills v${{ steps.get_version.outputs.version }}
          
          新版本发布！
          
          ### 下载二进制文件
          
          - **macOS ARM64**: [diting-macos-arm64](https://github.com/diting-ai/diting-skills/releases/download/v${{ steps.get_version.outputs.version }}/diting-macos-arm64)
          - **macOS x64**: [diting-macos-x64](https://github.com/diting-ai/diting-skills/releases/download/v${{ steps.get_version.outputs.version }}/diting-macos-x64)
          - **Linux x64**: [diting-linux-x64](https://github.com/diting-ai/diting-skills/releases/download/v${{ steps.get_version.outputs.version }}/diting-linux-x64)
          - **Windows x64**: [diting-win-x64.exe](https://github.com/diting-ai/diting-skills/releases/download/v${{ steps.get_version.outputs.version }}/diting-win-x64.exe)
          
          ### 安装
          ```bash
          npm install -g diting-skills
          ```
          
          ### 使用
          ```bash
          diting --help
          ```
        files: |
          dist/diting-macos-arm64
          dist/diting-macos-x64
          dist/diting-linux-x64
          dist/diting-win-x64.exe
        draft: false
        prerelease: false